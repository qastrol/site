<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>ASCII Image Converter</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>ASCII Image Converter</h1>

<div class="controls">
  <input type="file" id="fileInput" accept="image/png,image/jpeg,image/jpg,image/webp">

<label>
  ASCII breedte:
  <input type="range" id="widthRange" min="1" max="100" value="30">
  <span id="widthValue">30</span>
</label>


  <label>
    Inverteer kleuren:
    <input type="checkbox" id="invertCheckbox">
  </label>

<label>
  Transparantie vervangen door:
  <select id="transparentSelect">
    <option value="transparent">Transparant</option>
    <option value="white">Wit</option>
    <option value="black">Zwart</option>
  </select>
</label>


  <label>
    Contrast:
    <input type="range" id="contrastRange" min="0.5" max="3" step="0.1" value="1">
    <span id="contrastValue">1</span>
  </label>
</div>

<label>
  Color threshold:
  <input type="range" id="thresholdRange" min="0" max="255" value="128">
  <span id="thresholdValue">128</span>
</label>


<pre id="asciiOutput"></pre>

<canvas id="canvas" hidden></canvas>

<script src="script.js"></script>
</body>
</html>
